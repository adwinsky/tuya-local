name: RTX Smart Valve
products:
  - id: rtx_water_valve
    manufacturer: Tuya
entities:
  - entity: valve
    class: water
    dps:
      - id: 1
        type: boolean
        name: valve
  - entity: sensor
    class: volume_flow_rate
    icon: mdi:waves
    dps:
      - id: 5
        type: integer
        name: sensor
        unit: L/h
        class: measurement
  - entity: sensor
    class: water
    icon: mdi:water
    dps:
      - id: 6
        type: integer
        name: sensor
        unit: L
        class: total_increasing
  - entity: sensor
    name: Watering runtime
    icon: mdi:timer-outline
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: min
        class: measurement
  - entity: switch
    name: Flow alarm
    icon: mdi:water-alert
    category: config
    dps:
      - id: 123
        type: boolean
        name: switch
  - entity: number
    name: Minimum flow rate
    class: volume_flow_rate
    icon: mdi:arrow-collapse-down
    category: config
    dps:
      - id: 108
        type: integer
        optional: true
        name: value
        unit: L/h
        range:
          min: 0
          max: 5000
      - id: 123
        type: boolean
        name: available
  - entity: number
    name: Maximum flow rate
    class: volume_flow_rate
    icon: mdi:arrow-collapse-up
    category: config
    dps:
      - id: 109
        type: integer
        optional: true
        name: value
        unit: L/h
        range:
          min: 0
          max: 5000
      - id: 123
        type: boolean
        name: available
  - entity: select
    name: Flow unit
    icon: mdi:scale
    category: config
    dps:
      - id: 116
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: gal/min
          - dps_val: "2"
            value: m³/h
          - dps_val: "3"
            value: l/h
  - entity: event
    name: Valve state
    icon: mdi:valve
    dps:
      - id: 121
        type: string
        name: event
        mapping:
          - dps_val: "0"
            value: closed
          - dps_val: "1"
            value: transition
          - dps_val: "2"
            value: open
  - entity: sensor
    class: battery
    icon: mdi:battery
    dps:
      - id: 125
        type: integer
        name: sensor
        unit: "%"
        class: measurement
  - entity: select
    name: High flow linkage
    icon: mdi:alert-circle
    category: config
    dps:
      - id: 126
        type: string
        name: option
        mapping:
          - dps_val: "on"
            value: enabled
          - dps_val: "off"
            value: disabled
  - entity: select
    name: Low flow linkage
    icon: mdi:alert-circle-outline
    category: config
    dps:
      - id: 127
        type: string
        name: option
        mapping:
          - dps_val: "on"
            value: enabled
          - dps_val: "off"
            value: disabled
